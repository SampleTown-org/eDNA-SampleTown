site_name: SampleTown
site_description: MIxS-compliant eDNA sample tracking — docs
site_url: https://sampletown-org.github.io/eDNA-SampleTown/
repo_name: SampleTown-org/eDNA-SampleTown
repo_url: https://github.com/SampleTown-org/eDNA-SampleTown
edit_uri: edit/main/docs/
copyright: SampleTown — free for academic and nonprofit use

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SampleTown-org/eDNA-SampleTown

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - User:
      - user/index.md
      - Workflow: user/workflow.md
      - Sites & samples: user/sites-and-samples.md
      - Lab bench: user/lab-bench.md
      - Scanning & labels: user/scanning.md
      - Cart: user/cart.md
      - MIxS export & import: user/mixs.md
      - Manage (admin): user/manage.md
  - Dev:
      - dev/index.md
      - Architecture: dev/architecture.md
      - Database schema: dev/schema.md
      - Auth & sessions: dev/auth.md
      - Multi-lab tenancy: dev/multi-lab.md
      - API reference: dev/api.md
      - Security: dev/security.md
      - GitHub backup & restore: dev/backup.md
      - MIxS pipeline: dev/mixs.md
      - MIxS audit notes: dev/mixs-audit.md
  - Ops:
      - Deployment: ops/deployment.md
  - Changelog: changelog.md
